name: CI Pipeline

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read
  actions: read

jobs:
  test-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Setup Node.js (Backend)
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Cache backend dependencies
        uses: actions/cache@v5
        with:
          path: backend/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('backend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Setup Git for Prisma
        run: |
          git config --global user.email "ci@simdm.local"
          git config --global user.name "SIMDM CI"

      - name: Generate Prisma Client
        working-directory: backend
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test_db
          PRISMA_SKIP_GIT_VALIDATION: 1

      - name: Run migrations
        working-directory: backend
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test_db
          PRISMA_SKIP_GIT_VALIDATION: 1

      - name: Seed test DB
        working-directory: backend
        run: node prisma/seed.js
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test_db

      - name: Run backend tests + coverage
        working-directory: backend
        run: npm run test:coverage
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test_db
          JWT_ACCESS_SECRET: test_secret_64_chars_aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
          JWT_REFRESH_SECRET: test_secret_64_chars_aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
          ACCESS_TOKEN_EXPIRES: 15m
          REFRESH_TOKEN_EXPIRES: 7d
          TEST_PASSWORD: Test123!
          NODE_ENV: test

      - name: Lint check
        working-directory: backend
        run: npm run lint --if-present || echo "No lint script"

  test-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Setup Node.js (Frontend)
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Cache frontend dependencies
        uses: actions/cache@v5
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Setup Git for Prisma
        run: |
          git config --global user.email "ci@simdm.local"
          git config --global user.name "SIMDM CI"
        if: always()

      - name: Run frontend tests + coverage
        working-directory: frontend
        run: npm run test:coverage
        env:
          PRISMA_SKIP_GIT_VALIDATION: 1

      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          PRISMA_SKIP_GIT_VALIDATION: 1

      - name: Lint check
        working-directory: frontend
        run: npm run lint --if-present || echo "No lint script"
        env:
          PRISMA_SKIP_GIT_VALIDATION: 1
